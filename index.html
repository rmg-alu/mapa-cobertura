<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Cobertura España · CNMC + Movistar + Starlink + LeoLabs</title>
    <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/dark/main.css" />
    <style>
        :root {
            --bg: #0b0f1a;
            --panel: rgba(20,30,45,0.92);
            --primary: #0079c1;
            --glow: #00a8ff;
        }
        html, body, #viewDiv { padding: 0; margin: 0; height: 100%; width: 100%; background: var(--bg); }
        
        #controls {
            position: absolute; top: 15px; left: 15px; z-index: 99;
            background: var(--panel); padding: 12px 18px; border-radius: 40px;
            backdrop-filter: blur(8px); border: 1px solid #3a506e; display: flex;
            gap: 10px; flex-wrap: wrap;
        }
        .tech-btn {
            background: #1e2e44; border: none; color: #ddd; padding: 8px 20px;
            border-radius: 30px; font-weight: 600; font-size: 0.9rem; cursor: pointer;
            transition: 0.2s; border: 1px solid #3a5a7a;
        }
        .tech-btn:hover { background: #2a4058; }
        .tech-btn.active { background: var(--primary); color: #fff; border-color: var(--glow); box-shadow: 0 0 12px #0079c180; }
        .tech-btn.starlink-active { background: #1a1a4e; color: #a0c4ff; border-color: #6b6bff; box-shadow: 0 0 16px #3b3bff80; }
        .tech-btn.leolabs-active { background: #0d3b2e; color: #7ae0c0; border-color: #2ecc71; box-shadow: 0 0 16px #2ecc7180; }

        #status {
            position: absolute; bottom: 20px; left: 20px; z-index: 99;
            background: rgba(10,18,30,0.88); color: #bdd4e0; padding: 8px 18px;
            border-radius: 30px; font-size: 0.8rem; backdrop-filter: blur(5px);
            border-left: 4px solid #2ecc71; max-width: 420px;
        }

        #legend-box {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 98; background: var(--panel); padding: 10px 24px;
            border-radius: 40px; backdrop-filter: blur(8px); border: 1px solid #3a506e;
            display: flex; gap: 28px; color: #fff; font-size: 0.8rem; pointer-events: none;
            flex-wrap: wrap; justify-content: center;
        }
        .leg-item { display: flex; align-items: center; gap: 8px; }
        .leg-swatch { width: 18px; height: 18px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.25); }

        /* Modal LeoLabs */
        #leolabs-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
        }
        #leolabs-overlay.show { display: flex; align-items: center; justify-content: center; }
        #leolabs-frame {
            width: 92vw; height: 90vh; border: 2px solid #2ecc71; border-radius: 12px;
            background: #000;
        }
        #close-leolabs {
            position: absolute; top: 20px; right: 30px; z-index: 10000;
            background: #c0392b; color: #fff; border: none; padding: 10px 20px;
            border-radius: 30px; font-size: 1rem; cursor: pointer; font-weight: 700;
        }
        #close-leolabs:hover { background: #e74c3c; }

        @media (max-width: 700px) {
            #controls { top: 8px; left: 8px; right: 8px; border-radius: 30px; justify-content: center; }
            #status { left: 12px; right: 12px; bottom: 12px; max-width: none; }
            #legend-box { bottom: 75px; gap: 12px; }
        }
    </style>
</head>
<body>
    <div id="viewDiv"></div>

    <!-- Controles -->
    <div id="controls">
        <button id="btn4g" class="tech-btn active">4G</button>
        <button id="btn5g" class="tech-btn">5G</button>
        <button id="btn2g" class="tech-btn">2G</button>
        <button id="btn3g" class="tech-btn">3G</button>
        <button id="btnFiber" class="tech-btn">Fibra</button>
        <button id="btnWireless" class="tech-btn">FWA</button>
        <button id="btnStarlink" class="tech-btn">Starlink</button>
        <button id="btnLeolabs" class="tech-btn">LeoLabs</button>
    </div>

    <!-- Barra de estado -->
    <div id="status">Cargando datos oficiales…</div>

    <!-- Leyenda dinámica -->
    <div id="legend-box"></div>

    <!-- Modal LeoLabs -->
    <div id="leolabs-overlay">
        <button id="close-leolabs">✕ Cerrar</button>
        <iframe id="leolabs-frame"
                src=""
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen
                title="LeoLabs Starlink Visualization">
        </iframe>
    </div>

    <script src="https://js.arcgis.com/4.28/"></script>
    <script>
        (function() {
            require([
                "esri/Map", "esri/views/MapView",
                "esri/layers/FeatureLayer", "esri/layers/ImageryTileLayer",
                "esri/layers/MediaLayer", "esri/layers/GraphicsLayer",
                "esri/Graphic",
                "esri/geometry/Polygon", "esri/geometry/SpatialReference",
                "esri/widgets/Legend", "esri/widgets/ScaleBar"
            ], function(Map, MapView, FeatureLayer, ImageryTileLayer,
                       MediaLayer, GraphicsLayer,
                       Graphic, Polygon, SpatialReference,
                       Legend, ScaleBar) {

                // ═══════════ CONFIGURACIÓN DE EXTENTS (Web Mercator EPSG:3857) ═══════════
                const SPAIN_EXTENTS = {
                    peninsula: { xmin:-1311528, ymin:4015208, xmax:622041, ymax:5441252, spatialReference:{wkid:102100} },
                    baleares:  { xmin:150000,  ymin:4570000, xmax:480000, ymax:4900000, spatialReference:{wkid:102100} },
                    canarias:  { xmin:-2060000, ymin:3150000, xmax:-1450000, ymax:3450000, spatialReference:{wkid:102100} }
                };

                // ═══════════ COLORES REALES DE CADA CAPA (ajustados a lo que se ve en el mapa) ═══════════
                const LEGEND_COLORS = {
                    "4g":       { present: "#00FFC8", absent: "#0f1a2e", label:"Cian neón" },
                    "5g":       { present: "#e67e22", absent: "#2c3e50", label:"Naranja (ráster CNMC)" },
                    "2g":       { present: "#f39c12", absent: "#0f1a2e", label:"Ámbar (GIF Movistar)" },
                    "3g":       { present: "#3498db", absent: "#0f1a2e", label:"Azul (GIF Movistar)" },
                    "fiber":    { present: "#9b59b6", absent: "#0f1a2e", label:"Púrpura" },
                    "wireless": { present: "#1abc9c", absent: "#0f1a2e", label:"Turquesa" },
                    "starlink": { present: "#1a1a6e", absent: "#0b0f1a", label:"Azul Starlink" }
                };

                // ═══════════ PROXY CORS (solo para desarrollo) ═══════════
                function proxyUrl(url) {
                    return "https://proxy.killcors.com/?url=" + encodeURIComponent(url);
                }

                // ═══════════ SERVICIOS ═══════════
                const services = {
                    "4g": { type:"feature", url:"https://services9.arcgis.com/b5sc9d51LIwFoyfR/arcgis/rest/services/InfoCob4G_2024/FeatureServer/0" },
                    "5g": { type:"imagery-tile", url:"https://tiledimageservices9.arcgis.com/b5sc9d51LIwFoyfR/arcgis/rest/services/Cob5G_2024/ImageServer" },
                    "fiber": { type:"feature", url:"https://services9.arcgis.com/b5sc9d51LIwFoyfR/arcgis/rest/services/CobBAFija_2024_vista/FeatureServer/17" },
                    "wireless": { type:"feature", url:"https://services9.arcgis.com/b5sc9d51LIwFoyfR/arcgis/rest/services/CobFWA_2024_Vista/FeatureServer/0" },
                    "2g": { type:"media", url:"https://ssr.col.movistar.es/api/v3/get-pic/content/dam/movistar/sp/template/mapa-cobertura/gifs/GSM_1.gif" },
                    "3g": { type:"media", url:"https://ssr.col.movistar.es/api/v3/get-pic/content/dam/movistar/sp/template/mapa-cobertura/gifs/UMTS_1.gif" },
                    "starlink": { type:"graphics" }
                };

                let activeLayer = null, legendWidget = null, starlinkLayer = null;

                // ═══════════ MAPA ═══════════
                const map = new Map({ basemap:"dark-gray-vector" });
                const view = new MapView({
                    container:"viewDiv", map:map,
                    center:[-3.7,40.2], zoom:6,
                    constraints:{ minZoom:5, maxZoom:15 }
                });
                view.ui.add(new ScaleBar({view:view, unit:"metric"}),"bottom-left");
                legendWidget = new Legend({view:view, layerInfos:[]});
                view.ui.add(legendWidget,"bottom-right");

                // ═══════════ CAPA STARLINK (polígonos para Península + Baleares + Canarias) ═══════════
                function buildStarlinkLayer() {
                    if (starlinkLayer) return starlinkLayer;
                    const gl = new GraphicsLayer({ title:"Cobertura Starlink", opacity:0.55 });

                    const polys = [
                        { name:"Península", ring:[[-1311528,5441252],[-1311528,4015208],[622041,4015208],[622041,5441252],[-1311528,5441252]] },
                        { name:"Baleares", ring:[[150000,4900000],[150000,4570000],[480000,4570000],[480000,4900000],[150000,4900000]] },
                        { name:"Canarias", ring:[[-2060000,3450000],[-2060000,3150000],[-1450000,3150000],[-1450000,3450000],[-2060000,3450000]] }
                    ];

                    polys.forEach(function(p) {
                        const polygon = new Polygon({
                            rings:[p.ring],
                            spatialReference: new SpatialReference({wkid:102100})
                        });
                        const graphic = new Graphic({
                            geometry: polygon,
                            symbol: {
                                type:"simple-fill",
                                color:[26,26,110,0.35],
                                outline:{ color:[107,107,255,0.85], width:2.5, style:"dash-dot" }
                            },
                            attributes: { name:p.name },
                            popupTemplate: {
                                title:"🛰️ Starlink — " + p.name,
                                content:"Cobertura satelital de SpaceX disponible en toda España.<br>" +
                                        "Excepción: zona del Observatorio de Yebes (Guadalajara) por interferencias radioastronómicas."
                            }
                        });
                        gl.add(graphic);
                    });

                    starlinkLayer = gl;
                    return gl;
                }

                // ═══════════ RENDERERS PERSONALIZADOS (para que la leyenda coincida con lo que ves) ═══════════
                function getRenderer(tech) {
                    var c = LEGEND_COLORS[tech];
                    if (!c) return undefined;
                    // Convertir hex a RGBA
                    var hex = c.present.replace("#","");
                    var r = parseInt(hex.substring(0,2),16);
                    var g = parseInt(hex.substring(2,4),16);
                    var b = parseInt(hex.substring(4,6),16);
                    return {
                        type:"simple",
                        symbol: {
                            type:"simple-fill",
                            color:[r,g,b,0.45],
                            outline:{ color:[r,g,b,0.9], width:1.5 }
                        }
                    };
                }

                // ═══════════ ACTUALIZAR LEYENDA ═══════════
                function updateLegend(tech) {
                    var box = document.getElementById("legend-box");
                    var c = LEGEND_COLORS[tech];
                    if (!c) { box.innerHTML = ""; return; }
                    box.innerHTML =
                        '<div class="leg-item"><span class="leg-swatch" style="background:'+c.present+'"></span> Con cobertura ('+c.label+')</div>' +
                        '<div class="leg-item"><span class="leg-swatch" style="background:'+c.absent+'"></span> Sin cobertura / No disponible</div>';
                }

                // ═══════════ CAMBIAR CAPA ACTIVA ═══════════
                function setActiveLayer(tech) {
                    if (activeLayer && activeLayer !== starlinkLayer) {
                        map.remove(activeLayer);
                    }

                    // Botones
                    document.querySelectorAll(".tech-btn").forEach(function(b){ b.classList.remove("active","starlink-active","leolabs-active"); });
                    var btn = document.getElementById("btn"+tech.charAt(0).toUpperCase()+tech.slice(1));
                    if (tech==="starlink") btn.classList.add("starlink-active");
                    else if (tech==="leolabs") btn.classList.add("leolabs-active");
                    else btn.classList.add("active");

                    var status = document.getElementById("status");
                    status.innerHTML = "Cargando cobertura "+tech.toUpperCase()+"…";
                    updateLegend(tech);

                    // Si es LeoLabs, abrir modal y salir
                    if (tech === "leolabs") {
                        openLeoLabs();
                        status.innerHTML = "Visualizador LeoLabs · Satélites Starlink en tiempo real";
                        legendWidget.layerInfos = [];
                        return;
                    }

                    var svc = services[tech];
                    var layer;

                    try {
                        if (tech === "starlink") {
                            layer = buildStarlinkLayer();
                            map.add(layer);
                            activeLayer = layer;
                            status.innerHTML = "🛰️ Starlink · Disponible en toda España (Península, Baleares y Canarias)";
                            legendWidget.layerInfos = [{layer:layer, title:"Cobertura Starlink"}];
                            view.goTo({zoom:6}).catch(function(){});
                            return;
                        }

                        if (svc.type === "feature") {
                            layer = new FeatureLayer({
                                url: svc.url,
                                outFields: ["*"],
                                popupTemplate: { title:"Cobertura "+tech.toUpperCase(), content:[{type:"fields",fieldInfos:[]}] },
                                opacity: 0.8,
                                visible: true,
                                renderer: getRenderer(tech)
                            });
                            if (tech === "wireless" || tech === "fiber") {
                                layer.minScale = 0;
                                layer.maxScale = 0;
                            }
                        } else if (svc.type === "imagery-tile") {
                            layer = new ImageryTileLayer({ url:svc.url, opacity:0.8 });
                        } else if (svc.type === "media") {
                            // Intentar cargar con proxy (si falla CORS, el navegador igual muestra la imagen)
                            var finalUrl = proxyUrl(svc.url);
                            layer = new MediaLayer({
                                source: [{
                                    url: finalUrl,
                                    extent: SPAIN_EXTENTS.peninsula
                                }],
                                opacity: 0.9,
                                title: "Cobertura "+tech.toUpperCase()+" (Movistar)"
                            });
                        }

                        layer.when(function() {
                            status.innerHTML = "Cobertura "+tech.toUpperCase()+" cargada";
                            if (svc.type === "feature") {
                                legendWidget.layerInfos = [{layer:layer, title:"Cobertura "+tech.toUpperCase()}];
                            } else {
                                legendWidget.layerInfos = [];
                            }
                            if (tech==="wireless") view.goTo({zoom:8}).catch(function(){});
                            if (tech==="5g"||tech==="2g"||tech==="3g") view.goTo({zoom:7}).catch(function(){});
                        }).catch(function(err) {
                            console.error("Error cargando "+tech+":", err);
                            status.innerHTML = "Error al cargar "+tech.toUpperCase();
                        });

                        map.add(layer);
                        activeLayer = layer;

                    } catch(e) {
                        status.innerHTML = "Error al crear capa "+tech.toUpperCase();
                        console.error(e);
                    }
                }

                // ═══════════ LEO LABS IFRAME ═══════════
                function openLeoLabs() {
                    var overlay = document.getElementById("leolabs-overlay");
                    var frame = document.getElementById("leolabs-frame");
                    // URL directa con búsqueda pre-hecha de Starlink
                    frame.src = "https://platform.leolabs.space/visualizations/leo#search=starlink;view=originCountry";
                    overlay.classList.add("show");
                }

                function closeLeoLabs() {
                    var overlay = document.getElementById("leolabs-overlay");
                    var frame = document.getElementById("leolabs-frame");
                    overlay.classList.remove("show");
                    frame.src = ""; // Detener carga
                    // Volver a 4G al cerrar
                    setActiveLayer("4g");
                }

                document.getElementById("close-leolabs").addEventListener("click", closeLeoLabs);
                // Cerrar con Escape
                document.addEventListener("keydown", function(e) {
                    if (e.key === "Escape") closeLeoLabs();
                });

                // ═══════════ EVENT LISTENERS ═══════════
                document.getElementById("btn4g").addEventListener("click", function(){ setActiveLayer("4g"); });
                document.getElementById("btn5g").addEventListener("click", function(){ setActiveLayer("5g"); });
                document.getElementById("btn2g").addEventListener("click", function(){ setActiveLayer("2g"); });
                document.getElementById("btn3g").addEventListener("click", function(){ setActiveLayer("3g"); });
                document.getElementById("btnFiber").addEventListener("click", function(){ setActiveLayer("fiber"); });
                document.getElementById("btnWireless").addEventListener("click", function(){ setActiveLayer("wireless"); });
                document.getElementById("btnStarlink").addEventListener("click", function(){ setActiveLayer("starlink"); });
                document.getElementById("btnLeolabs").addEventListener("click", function(){ setActiveLayer("leolabs"); });

                // ═══════════ INICIO ═══════════
                view.when(function() {
                    setActiveLayer("4g");
                });
            });
        })();
    </script>
</body>
</html>
