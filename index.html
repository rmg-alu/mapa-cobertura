<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Mapa de Cobertura Pro · Calibrado</title>
    <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/dark/main.css" />
    <style>
        :root {
            --bg: #0b0f1a;
            --panel: rgba(15, 23, 42, 0.95);
            --primary: #0079c1;
        }
        html, body, #viewDiv { padding: 0; margin: 0; height: 100%; width: 100%; background: var(--bg); font-family: 'Segoe UI', sans-serif; }
        
        #controls {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 99;
            background: var(--panel); padding: 8px; border-radius: 50px;
            backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);
            display: flex; gap: 5px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .tech-btn {
            background: transparent; border: none; color: #94a3b8; padding: 10px 18px;
            border-radius: 40px; font-weight: 600; font-size: 0.85rem; cursor: pointer;
            transition: all 0.2s ease;
        }
        .tech-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .tech-btn.active { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(0,121,193,0.4); }
        .tech-btn.leo-active { background: #3b3bff; color: #fff; }

        #status-pill {
            position: absolute; bottom: 30px; left: 20px; z-index: 99;
            background: rgba(0,0,0,0.6); color: #fff; padding: 6px 16px;
            border-radius: 20px; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1);
        }

        @media (max-width: 768px) {
            #controls { width: 95%; flex-wrap: wrap; justify-content: center; border-radius: 20px; }
        }
    </style>
</head>
<body>
    <div id="viewDiv"></div>

    <div id="controls">
        <button id="btn2g" class="tech-btn">2G</button>
        <button id="btn3g" class="tech-btn">3G</button>
        <button id="btn4g" class="tech-btn active">4G</button>
        <button id="btn5g" class="tech-btn">5G</button>
        <button id="btnFiber" class="tech-btn">Fibra</button>
        <button id="btnWireless" class="tech-btn">FWA</button>
        <button id="btnLeo" class="tech-btn">LEO (Satélite)</button>
    </div>

    <div id="status-pill">Cargando visor...</div>

    <script src="https://js.arcgis.com/4.28/"></script>
    <script>
        require([
            "esri/Map", "esri/views/MapView", "esri/layers/FeatureLayer", 
            "esri/layers/ImageryTileLayer", "esri/layers/MediaLayer", 
            "esri/layers/GraphicsLayer", "esri/Graphic", "esri/geometry/Extent", 
            "esri/geometry/SpatialReference", "esri/layers/support/ImageElement",
            "esri/layers/support/ExtentAndRotationGeoreference", "esri/geometry/Polygon"
        ], function(Map, MapView, FeatureLayer, ImageryTileLayer, MediaLayer, 
                    GraphicsLayer, Graphic, Extent, SpatialReference, 
                    ImageElement, ExtentAndRotationGeoreference, Polygon) {

            const SR = new SpatialReference({ wkid: 102100 });

            const SPAIN_EXTENTS = {
                peninsula: new Extent({ xmin: -1060000, ymin: 4150000, xmax: 560000, ymax: 5460000, spatialReference: SR }),
                canarias: new Extent({ xmin: -2050000, ymin: 3180000, xmax: -1480000, ymax: 3480000, spatialReference: SR })
            };

            const map = new Map({ basemap: "dark-gray-vector" });
            const view = new MapView({
                container: "viewDiv", map: map,
                center: [-3.7, 40.2], zoom: 6,
                ui: { components: ["attribution"] }
            });

            let currentLayer = null;

            function updateUI(tech) {
                document.querySelectorAll(".tech-btn").forEach(b => b.classList.remove("active", "leo-active"));
                const btnId = tech === "leo" ? "btnLeo" : "btn" + tech.charAt(0).toUpperCase() + tech.slice(1);
                const activeBtn = document.getElementById(btnId);
                
                if (tech === "leo") activeBtn.classList.add("leo-active");
                else activeBtn.classList.add("active");
                
                const label = tech === "leo" ? "Órbitas LEO (Satélite)" : tech.toUpperCase();
                document.getElementById("status-pill").innerHTML = "📡 Capa activa: " + label;
            }

            async function loadLayer(tech) {
                if (currentLayer) {
                    map.remove(currentLayer);
                    currentLayer.destroy();
                    currentLayer = null;
                }

                updateUI(tech);

                switch(tech) {
                    case "2g":
                    case "3g":
                        const prefix = tech === "2g" ? "GSM" : "UMTS";
                        currentLayer = new MediaLayer({
                            source: [
                                new ImageElement({ image: `https://rmg-alu.github.io/mapa-cobertura/${prefix}_1.gif`, georeference: new ExtentAndRotationGeoreference({ extent: SPAIN_EXTENTS.peninsula }) }),
                                new ImageElement({ image: `https://rmg-alu.github.io/mapa-cobertura/${prefix}_2.gif`, georeference: new ExtentAndRotationGeoreference({ extent: SPAIN_EXTENTS.canarias }) })
                            ],
                            opacity: 0.7
                        });
                        break;

                    case "4g":
                        currentLayer = new FeatureLayer({
                            url: "https://services9.arcgis.com/b5sc9d51LIwFoyfR/arcgis/rest/services/InfoCob4G_2024/FeatureServer/0",
                            // NEÓN REDUCIDO AL MÍNIMO (Efecto casi imperceptible)
                            effect: "bloom(0.2, 0.2px, 0.01)", 
                            renderer: {
                                type: "simple",
                                symbol: {
                                    type: "simple-fill",
                                    color: [0, 200, 220, 0.1], // Color más apagado
                                    outline: { color: [0, 150, 180, 0.4], width: 0.3 } // Línea más fina y oscura
                                }
                            }
                        });
                        break;

                    case "5g":
                        currentLayer = new ImageryTileLayer({
                            url: "https://tiledimageservices9.arcgis.com/b5sc9d51LIwFoyfR/arcgis/rest/services/Cob5G_2024/ImageServer",
                            opacity: 0.7
                        });
                        break;

                    case "fiber":
                        currentLayer = new FeatureLayer({
                            url: "https://services9.arcgis.com/b5sc9d51LIwFoyfR/arcgis/rest/services/CobBAFija_2024_vista/FeatureServer/17",
                            renderer: {
                                type: "simple",
                                symbol: { type: "simple-fill", color: [155, 89, 182, 0.3], outline: { color: "#9b59b6", width: 0.5 } }
                            }
                        });
                        break;

                    case "wireless":
                        currentLayer = new FeatureLayer({
                            url: "https://services9.arcgis.com/b5sc9d51LIwFoyfR/arcgis/rest/services/CobFWA_2024_Vista/FeatureServer/0",
                            renderer: {
                                type: "simple",
                                symbol: { type: "simple-fill", color: [26, 188, 156, 0.3], outline: { color: "#1abc9c", width: 0.5 } }
                            }
                        });
                        break;

                    case "leo":
                        currentLayer = new GraphicsLayer();
                        const leoGeom = new Polygon({
                            rings: [
                                [[-1060000, 5460000], [560000, 5460000], [560000, 4280000], [-1060000, 4280000], [-1060000, 5460000]]
                            ],
                            spatialReference: SR
                        });
                        currentLayer.add(new Graphic({
                            geometry: leoGeom,
                            symbol: { type: "simple-fill", color: [59, 59, 255, 0.15], outline: { color: [100, 100, 255, 0.6], width: 1 } }
                        }));
                        break;
                }

                if (currentLayer) map.add(currentLayer);
            }

            document.getElementById("btn2g").onclick = () => loadLayer("2g");
            document.getElementById("btn3g").onclick = () => loadLayer("3g");
            document.getElementById("btn4g").onclick = () => loadLayer("4g");
            document.getElementById("btn5g").onclick = () => loadLayer("5g");
            document.getElementById("btnFiber").onclick = () => loadLayer("fiber");
            document.getElementById("btnWireless").onclick = () => loadLayer("wireless");
            document.getElementById("btnLeo").onclick = () => loadLayer("leo");

            view.when(() => loadLayer("4g"));
        });
    </script>
</body>
</html>
